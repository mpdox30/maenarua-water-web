name: Deploy website to GitHub Pages

# Deploy the contents of 03_website/ (the static site) to GitHub Pages, every time
# something is pushed to master. Does not touch 01_data/ or anything else in the repo —
# only 03_website/ is uploaded as the published site root.

on:
  push:
    branches: ["master"]
  workflow_dispatch:   # allows manual "Run workflow" button in the Actions tab too

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload 03_website/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./03_website"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
